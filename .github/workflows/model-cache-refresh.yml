name: Model Cache Refresh

on:
  schedule:
    # 15:30 UTC = 10:30 CT during daylight time, after early market data settles.
    - cron: "30 15 * * *"
    # 20:30 UTC = 15:30 CT during daylight time, safety-net refresh before evening games.
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional target date (YYYY-MM-DD or MM/DD/YYYY)"
        required: false
        default: ""
      models:
        description: "Comma-separated models, or all"
        required: false
        default: "mlb_new,mlb_inning,mlb_first_five,wnba,nba,nba_old,nba_playoffs,nba_props"

permissions:
  contents: write

concurrency:
  group: model-cache-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
      FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
      FIREBASE_CLIENT_ID: ${{ secrets.FIREBASE_CLIENT_ID }}
      PICKLEDGER_REQUIRE_AUTH: true
      PICKLEDGER_ADMIN_EMAILS: ${{ secrets.PICKLEDGER_ADMIN_EMAILS }}
      PICKLEDGER_MLB_TIMEZONE: America/Chicago
      PICKLEDGER_MLB_MODEL_TIMEOUT_SECONDS: 1200
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh model caches
        run: |
          python scripts/refresh_model_cache.py \
            --date "${{ github.event.inputs.date || '' }}" \
            --models "${{ github.event.inputs.models || 'mlb_new,mlb_inning,mlb_first_five,wnba,nba,nba_old,nba_playoffs,nba_props' }}" \
            --max-workers 3

      - name: Commit cache JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain -- data/model_cache)" ]; then
            echo "No change in data/model_cache — skipping commit."
            exit 0
          fi
          git add data/model_cache
          CACHE_DATE=$(python -c "import json; print(json.load(open('data/model_cache/latest.json'))['date'])")
          git commit -m "chore(models): refresh model cache for ${CACHE_DATE}"
          git push

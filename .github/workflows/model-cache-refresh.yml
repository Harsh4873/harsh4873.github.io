name: Model Cache Refresh

on:
  schedule:
    # 12:45 UTC = 7:45 CT during daylight time, early safety warmup before GitHub queue delays.
    - cron: "45 12 * * *"
    # 13:05 UTC = 8:05 CT during daylight time, redundant morning warmup.
    - cron: "5 13 * * *"
    # 13:30 UTC = 8:30 CT during daylight time, so morning checks have a same-day cache.
    - cron: "30 13 * * *"
    # 14:05 UTC = 9:05 CT during daylight time, after more markets post lines.
    - cron: "5 14 * * *"
    # 15:30 UTC = 10:30 CT during daylight time, after early market data settles.
    - cron: "30 15 * * *"
    # 20:05 UTC = 15:05 CT during daylight time, pregame rerun before evening MLB starts.
    - cron: "5 20 * * *"
    # 20:30 UTC = 15:30 CT during daylight time, safety-net refresh before evening games.
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional target date (YYYY-MM-DD or MM/DD/YYYY)"
        required: false
        default: ""
      models:
        description: "Comma-separated models, or all"
        required: false
        default: "mlb_new,mlb_old,mlb_inning,mlb_first_five,wnba,nba,nba_old,nba_playoffs,nba_props"

permissions:
  contents: write
  actions: write

concurrency:
  group: model-cache-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
      FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
      FIREBASE_CLIENT_ID: ${{ secrets.FIREBASE_CLIENT_ID }}
      PICKLEDGER_REQUIRE_AUTH: true
      PICKLEDGER_ADMIN_EMAILS: ${{ secrets.PICKLEDGER_ADMIN_EMAILS }}
      PICKLEDGER_MLB_TIMEZONE: America/Chicago
      PICKLEDGER_MLB_MODEL_TIMEOUT_SECONDS: 1200
      PICKLEDGER_MLB_INNING_TIMEOUT_SECONDS: 240
      PICKLEDGER_MLB_INNING_LOOKAHEAD_DAYS: 0
      PICKLEDGER_RUN_WNBA: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh model caches
        run: |
          python scripts/refresh_model_cache.py \
            --date "${{ github.event.inputs.date || '' }}" \
            --models "${{ github.event.inputs.models || 'mlb_new,mlb_old,mlb_inning,mlb_first_five,wnba,nba,nba_old,nba_playoffs,nba_props' }}" \
            --max-workers 3

      - name: Commit cache JSON if changed
        id: commit-cache
        run: |
          ACTOR_EMAIL="${GITHUB_ACTOR_ID:-41898282}+${GITHUB_ACTOR}@users.noreply.github.com"
          git config user.name  "${GITHUB_ACTOR}"
          git config user.email "${ACTOR_EMAIL}"
          BRANCH="${GITHUB_REF_NAME:-main}"
          if [ -z "$(git status --porcelain -- data/model_cache)" ]; then
            echo "No change in data/model_cache — skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git pull --rebase --autostash origin "$BRANCH"
          git add data/model_cache
          if git diff --cached --quiet; then
            echo "No staged cache change after rebase — skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CACHE_DATE=$(python -c "import json; print(json.load(open('data/model_cache/latest.json'))['date'])")
          git commit -m "chore(models): refresh model cache for ${CACHE_DATE}"
          for attempt in 1 2 3; do
            if git push origin "HEAD:${BRANCH}"; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; rebasing on origin/${BRANCH} before retry."
            git fetch origin "$BRANCH"
            git rebase "origin/${BRANCH}"
          done
          git push origin "HEAD:${BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy after cache commit
        if: steps.commit-cache.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main

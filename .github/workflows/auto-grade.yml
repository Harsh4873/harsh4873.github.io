name: Auto-Grade Picks

on:
  schedule:
    # Run every 30 minutes from 6 PM to 2 AM CT (23:00 to 07:00 UTC)
    - cron: '*/30 23,0,1,2,3,4,5,6,7 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-grade
  cancel-in-progress: true

jobs:
  auto-grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install pytz beautifulsoup4 lxml requests

      - name: Run Auto-Grader
        run: |
          python3 scripts/auto_grade_picks.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore(grade): auto-grade pending picks" || echo "No changes to commit"
          git push

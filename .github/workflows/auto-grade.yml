name: Auto-Grade Picks

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pick-cache-writer
  cancel-in-progress: false

jobs:
  auto-grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Auto-Grader
        run: |
          python3 scripts/auto_grade_picks.py

      - name: Commit and Push Changes
        id: commit-grades
        run: |
          ACTOR_EMAIL="${GITHUB_ACTOR_ID:-41898282}+${GITHUB_ACTOR}@users.noreply.github.com"
          git config user.name  "${GITHUB_ACTOR}"
          git config user.email "${ACTOR_EMAIL}"
          BRANCH="${GITHUB_REF_NAME:-main}"
          if [ -z "$(git status --porcelain -- data/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add data/
          git commit -m "chore(grade): update committed pick results"
          git push origin "HEAD:${BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

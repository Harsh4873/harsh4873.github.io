name: Cannon MLB Daily Refresh

# Regenerates data/cannon_mlb_daily.json every morning with TODAY's slate so
# GitHub Pages always serves fresh Cannon projections + SportsLine odds.
#
# The export script reads "today" from MLBPredictionModel.date_utils.get_mlb_slate_date()
# (America/Chicago), so the cron just needs to fire after the Cannon backend
# publishes its daily batch. Runs several times around 09:00 CT because GitHub
# scheduled workflows can be delayed, then again around 15:00 CT as a safety net.

on:
  schedule:
    # 13:55 UTC = 08:55 CT during daylight time, first attempt near line confirmation.
    - cron: "55 13 * * *"
    # 14:15 UTC = 09:15 CT during daylight time, avoids exact-hour scheduler delays.
    - cron: "15 14 * * *"
    # 14:35 UTC = 09:35 CT during daylight time, backup if Cannon/lines post late.
    - cron: "35 14 * * *"
    # 20:05 UTC = 15:05 CT during daylight time, safety-net refresh before most first pitches.
    - cron: "5 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: cannon-daily-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PICKLEDGER_MLB_TIMEZONE: America/Chicago
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLBPredictionModel/requirements.txt
          pip install beautifulsoup4

      - name: Regenerate Cannon daily JSON
        run: python -m MLBPredictionModel.export_cannon_daily_json

      - name: Commit and push if changed
        id: commit-cannon
        run: |
          ACTOR_EMAIL="${GITHUB_ACTOR_ID:-41898282}+${GITHUB_ACTOR}@users.noreply.github.com"
          git config user.name  "${GITHUB_ACTOR}"
          git config user.email "${ACTOR_EMAIL}"
          if git diff --quiet -- data/cannon_mlb_daily.json; then
            echo "No change in data/cannon_mlb_daily.json — skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SLATE=$(python -c "import json; print(json.load(open('data/cannon_mlb_daily.json'))['slate_date'])")
          git add data/cannon_mlb_daily.json
          git commit -m "chore(mlb): refresh Cannon daily JSON for ${SLATE}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy after Cannon refresh
        if: steps.commit-cannon.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.daily-data.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check daily data readiness
        id: daily-data
        run: |
          if python scripts/site_upcheck.py --data-only; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Daily model data is not ready. Deployment was deferred without failing."
          fi

  deploy:
    needs: readiness
    if: needs.readiness.outputs.ready == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Gym app
        uses: actions/checkout@v4
        with:
          ref: gym
          path: gym-app

      - name: Checkout personal portfolio
        uses: actions/checkout@v4
        with:
          ref: portfolio
          path: portfolio-app

      - name: Checkout Daymark
        uses: actions/checkout@v4
        with:
          ref: daymark
          path: daymark-app

      - name: Checkout Slate
        uses: actions/checkout@v4
        with:
          ref: slate
          path: slate-app

      - name: Checkout Fare
        uses: actions/checkout@v4
        with:
          ref: fare
          path: fare-app

      - name: Checkout genes (MtbScope)
        uses: actions/checkout@v4
        with:
          ref: genome
          path: genes-app

      - name: Checkout Sift research workspace
        uses: actions/checkout@v4
        with:
          ref: research
          path: research-app

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            gym-app/package-lock.json
            portfolio-app/package-lock.json
            daymark-app/package-lock.json
            slate-app/package-lock.json
            fare-app/package-lock.json
            genes-app/package-lock.json
            research-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Gym dependencies
        working-directory: gym-app
        run: npm ci

      - name: Install portfolio dependencies
        working-directory: portfolio-app
        run: npm ci

      - name: Install Daymark dependencies
        working-directory: daymark-app
        run: npm ci

      - name: Install Slate dependencies
        working-directory: slate-app
        run: npm ci

      - name: Install Fare dependencies
        working-directory: fare-app
        run: npm ci

      - name: Install genes dependencies
        working-directory: genes-app
        run: npm ci

      - name: Install Sift dependencies
        working-directory: research-app
        run: npm ci

      - name: Build site artifact
        run: |
          npm run build
          mkdir -p dist/ipl dist/data
          cp .nojekyll dist/ || true
          cp CNAME dist/ || true
          cp ipl/ipl_styles.css dist/ipl/ || true
          cp ipl/ipl_frontend.js dist/ipl/ || true
          cp -R data/. dist/data/ || true

      - name: Build Gym artifact
        working-directory: gym-app
        run: |
          npm run build
          mkdir -p ../dist/gym
          cp -R dist/. ../dist/gym/

      - name: Build personal portfolio artifact
        working-directory: portfolio-app
        run: |
          npm run build
          mkdir -p ../dist/portfolio
          cp -R dist/. ../dist/portfolio/

      - name: Build Daymark artifact
        working-directory: daymark-app
        run: |
          npm run build
          mkdir -p ../dist/daymark
          cp -R dist/. ../dist/daymark/

      - name: Build Slate artifact
        working-directory: slate-app
        run: |
          npm run build
          mkdir -p ../dist/slate
          cp -R dist/. ../dist/slate/

      - name: Build Fare artifact
        working-directory: fare-app
        run: |
          npm run build
          mkdir -p ../dist/fare
          cp -R dist/. ../dist/fare/

      - name: Build genes artifact
        working-directory: genes-app
        run: |
          npm run build
          mkdir -p ../dist/genes
          cp -R dist/. ../dist/genes/

      - name: Build Sift artifact
        working-directory: research-app
        env:
          VITE_RESEARCH_API_URL: ${{ vars.RESEARCH_API_URL }}
        run: |
          test -n "$VITE_RESEARCH_API_URL"
          npm run build
          mkdir -p ../dist/research
          cp -R dist/. ../dist/research/

      - name: Verify styled Pages artifact
        run: |
          grep -q 'rel="stylesheet"' dist/index.html
          grep -q 'type="module"' dist/index.html
          test -n "$(find dist/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/assets -maxdepth 1 -name '*.js' -print -quit)"
          ! grep -q 'src/main.ts' dist/index.html
          grep -q 'rel="apple-touch-icon"' dist/index.html
          test -f dist/data/model_cache/index.json
          test -f dist/data/profit_desk/index.json
          test -f dist/data/profit_desk/latest.json
          test -f dist/gym/index.html
          grep -q '/gym/assets/' dist/gym/index.html
          test -n "$(find dist/gym/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/gym/assets -maxdepth 1 -name '*.js' -print -quit)"
          grep -q 'rel="apple-touch-icon"' dist/gym/index.html
          test -f dist/gym/apple-touch-icon.png
          test -f dist/portfolio/index.html
          grep -q '/portfolio/assets/' dist/portfolio/index.html
          test -n "$(find dist/portfolio/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/portfolio/assets -maxdepth 1 -name '*.js' -print -quit)"
          grep -q 'rel="apple-touch-icon"' dist/portfolio/index.html
          test -f dist/portfolio/apple-touch-icon.png
          test -f dist/daymark/index.html
          grep -q '/daymark/assets/' dist/daymark/index.html
          test -n "$(find dist/daymark/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/daymark/assets -maxdepth 1 -name '*.js' -print -quit)"
          grep -q 'rel="apple-touch-icon"' dist/daymark/index.html
          test -f dist/daymark/apple-touch-icon.png
          test -f dist/slate/index.html
          grep -q '/slate/assets/' dist/slate/index.html
          test -n "$(find dist/slate/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/slate/assets -maxdepth 1 -name '*.js' -print -quit)"
          grep -q 'rel="apple-touch-icon"' dist/slate/index.html
          test -f dist/slate/apple-touch-icon.png
          test -f dist/fare/index.html
          grep -q '/fare/assets/' dist/fare/index.html
          test -n "$(find dist/fare/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/fare/assets -maxdepth 1 -name '*.js' -print -quit)"
          grep -q 'rel="apple-touch-icon"' dist/fare/index.html
          test -f dist/fare/apple-touch-icon.png
          test -f dist/fare/manifest.webmanifest
          test -f dist/fare/icon-192.png
          test -f dist/fare/icon-512.png
          test -f dist/fare/sw.js
          test -f dist/genes/index.html
          grep -q '/genes/assets/' dist/genes/index.html
          test -n "$(find dist/genes/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/genes/assets -maxdepth 1 -name '*.js' -print -quit)"
          test -f dist/genes/data/genes.json
          test -f dist/genes/manifest.webmanifest
          test -f dist/research/index.html
          grep -q '/research/assets/' dist/research/index.html
          test -n "$(find dist/research/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/research/assets -maxdepth 1 -name '*.js' -print -quit)"
          grep -q 'rel="apple-touch-icon"' dist/research/index.html
          test -f dist/research/apple-touch-icon.png
          test -f dist/research/manifest.webmanifest
          test -f dist/research/icon-192.png
          test -f dist/research/icon-512.png
          test -f dist/research/sw.js
          python scripts/site_upcheck.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

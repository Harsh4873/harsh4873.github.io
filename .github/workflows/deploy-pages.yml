name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build site artifact
        env:
          VITE_PICKLEDGER_BACKEND_URL: ${{ vars.PICKLEDGER_BACKEND_URL }}
        run: |
          npm run build
          mkdir -p dist/ipl dist/data
          cp .nojekyll dist/
          cp CNAME dist/
          cp ipl/ipl_styles.css dist/ipl/
          cp ipl/ipl_frontend.js dist/ipl/
          cp data/cannon_mlb_daily.json dist/data/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

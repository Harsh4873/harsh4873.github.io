name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.daily-data.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check daily data readiness
        id: daily-data
        run: |
          if python scripts/site_upcheck.py --data-only; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Daily model data is not ready. Deployment was deferred without failing."
          fi

  deploy:
    needs: readiness
    if: needs.readiness.outputs.ready == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build site artifact
        run: |
          npm run build
          mkdir -p dist/ipl dist/data
          cp .nojekyll dist/ || true
          cp CNAME dist/ || true
          cp ipl/ipl_styles.css dist/ipl/ || true
          cp ipl/ipl_frontend.js dist/ipl/ || true
          cp -R data/. dist/data/ || true

      - name: Verify styled Pages artifact
        run: |
          grep -q 'rel="stylesheet"' dist/index.html
          grep -q 'type="module"' dist/index.html
          test -n "$(find dist/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/assets -maxdepth 1 -name '*.js' -print -quit)"
          ! grep -q 'src/main.ts' dist/index.html
          test -f dist/data/model_cache/index.json
          python scripts/site_upcheck.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.daily-data.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check daily data readiness
        id: daily-data
        run: |
          if python scripts/site_upcheck.py --data-only; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Daily model data is not ready. Deployment was deferred without failing."
          fi

  deploy:
    needs: readiness
    if: needs.readiness.outputs.ready == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Gym app
        uses: actions/checkout@v4
        with:
          ref: gym
          path: gym-app

      - name: Checkout personal portfolio
        uses: actions/checkout@v4
        with:
          ref: me
          path: me-app

      - name: Checkout habit tracker
        uses: actions/checkout@v4
        with:
          ref: tracker
          path: tracker-app

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            gym-app/package-lock.json
            me-app/package-lock.json
            tracker-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Gym dependencies
        working-directory: gym-app
        run: npm ci

      - name: Install portfolio dependencies
        working-directory: me-app
        run: npm ci

      - name: Install tracker dependencies
        working-directory: tracker-app
        run: npm ci

      - name: Build site artifact
        run: |
          npm run build
          mkdir -p dist/ipl dist/data
          cp .nojekyll dist/ || true
          cp CNAME dist/ || true
          cp ipl/ipl_styles.css dist/ipl/ || true
          cp ipl/ipl_frontend.js dist/ipl/ || true
          cp -R data/. dist/data/ || true

      - name: Build Gym artifact
        working-directory: gym-app
        run: |
          npm run build
          mkdir -p ../dist/gym
          cp -R dist/. ../dist/gym/

      - name: Build personal portfolio artifact
        working-directory: me-app
        run: |
          npm run build
          mkdir -p ../dist/me
          cp -R dist/. ../dist/me/

      - name: Build habit tracker artifact
        working-directory: tracker-app
        run: |
          npm run build
          mkdir -p ../dist/tracker
          cp -R dist/. ../dist/tracker/

      - name: Verify styled Pages artifact
        run: |
          grep -q 'rel="stylesheet"' dist/index.html
          grep -q 'type="module"' dist/index.html
          test -n "$(find dist/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/assets -maxdepth 1 -name '*.js' -print -quit)"
          ! grep -q 'src/main.ts' dist/index.html
          test -f dist/data/model_cache/index.json
          test -f dist/data/profit_desk/index.json
          test -f dist/data/profit_desk/latest.json
          test -f dist/gym/index.html
          grep -q '/gym/assets/' dist/gym/index.html
          test -n "$(find dist/gym/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/gym/assets -maxdepth 1 -name '*.js' -print -quit)"
          test -f dist/me/index.html
          grep -q '/me/assets/' dist/me/index.html
          test -n "$(find dist/me/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/me/assets -maxdepth 1 -name '*.js' -print -quit)"
          test -f dist/tracker/index.html
          grep -q '/tracker/assets/' dist/tracker/index.html
          test -n "$(find dist/tracker/assets -maxdepth 1 -name '*.css' -print -quit)"
          test -n "$(find dist/tracker/assets -maxdepth 1 -name '*.js' -print -quit)"
          python scripts/site_upcheck.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

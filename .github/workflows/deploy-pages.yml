name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.daily-data.outputs.ready }}
    steps:
      - name: Checkout PickLedger data branch
        uses: actions/checkout@v4
        with:
          ref: pickledger
          path: pickledger-app

      - name: Check daily data readiness
        id: daily-data
        working-directory: pickledger-app
        run: |
          if python scripts/site_upcheck.py --data-only; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Daily model data is not ready. Deployment was deferred without failing."
          fi

  deploy:
    needs: readiness
    if: needs.readiness.outputs.ready == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout landing site
        uses: actions/checkout@v4

      - name: Checkout PickLedger app
        uses: actions/checkout@v4
        with:
          ref: pickledger
          path: pickledger-app

      - name: Checkout Gym app
        uses: actions/checkout@v4
        with:
          ref: gym
          path: gym-app

      - name: Checkout personal portfolio
        uses: actions/checkout@v4
        with:
          ref: portfolio
          path: portfolio-app

      - name: Checkout Daymark
        uses: actions/checkout@v4
        with:
          ref: daymark
          path: daymark-app

      - name: Checkout Slate
        uses: actions/checkout@v4
        with:
          ref: slate
          path: slate-app

      - name: Checkout Fare
        uses: actions/checkout@v4
        with:
          ref: fare
          path: fare-app

      - name: Checkout genes (MtbScope)
        uses: actions/checkout@v4
        with:
          ref: genome
          path: genes-app

      - name: Checkout Sift research workspace
        uses: actions/checkout@v4
        with:
          ref: research
          path: research-app

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            pickledger-app/package-lock.json
            gym-app/package-lock.json
            portfolio-app/package-lock.json
            daymark-app/package-lock.json
            slate-app/package-lock.json
            fare-app/package-lock.json
            genes-app/package-lock.json
            research-app/package-lock.json

      - name: Install landing dependencies
        run: npm ci

      - name: Install PickLedger dependencies
        working-directory: pickledger-app
        run: npm ci

      - name: Install Gym dependencies
        working-directory: gym-app
        run: npm ci

      - name: Install portfolio dependencies
        working-directory: portfolio-app
        run: npm ci

      - name: Install Daymark dependencies
        working-directory: daymark-app
        run: npm ci

      - name: Install Slate dependencies
        working-directory: slate-app
        run: npm ci

      - name: Install Fare dependencies
        working-directory: fare-app
        run: npm ci

      - name: Install genes dependencies
        working-directory: genes-app
        run: npm ci

      - name: Install Sift dependencies
        working-directory: research-app
        run: npm ci

      - name: Build landing artifact
        run: |
          npm run build
          mkdir -p dist

      - name: Build PickLedger artifact
        working-directory: pickledger-app
        run: |
          npm run build
          python scripts/site_upcheck.py
          mkdir -p ../dist/pickledger
          cp -R dist/. ../dist/pickledger/
          mkdir -p ../dist/pickledger/data ../dist/pickledger/ipl
          cp -R data/. ../dist/pickledger/data/
          cp ipl/ipl_styles.css ../dist/pickledger/ipl/ || true
          cp ipl/ipl_frontend.js ../dist/pickledger/ipl/ || true

      - name: Build Gym artifact
        working-directory: gym-app
        run: |
          npm run build
          mkdir -p ../dist/gym
          cp -R dist/. ../dist/gym/

      - name: Build personal portfolio artifact
        working-directory: portfolio-app
        run: |
          npm run build
          mkdir -p ../dist/portfolio
          cp -R dist/. ../dist/portfolio/

      - name: Build Daymark artifact
        working-directory: daymark-app
        run: |
          npm run build
          mkdir -p ../dist/daymark
          cp -R dist/. ../dist/daymark/

      - name: Build Slate artifact
        working-directory: slate-app
        run: |
          npm run build
          mkdir -p ../dist/slate
          cp -R dist/. ../dist/slate/

      - name: Build Fare artifact
        working-directory: fare-app
        run: |
          npm run build
          mkdir -p ../dist/fare
          cp -R dist/. ../dist/fare/

      - name: Build genes artifact
        working-directory: genes-app
        run: |
          npm run build
          mkdir -p ../dist/genes
          cp -R dist/. ../dist/genes/

      - name: Build Sift artifact
        working-directory: research-app
        env:
          VITE_RESEARCH_API_URL: ${{ vars.RESEARCH_API_URL }}
        run: |
          test -n "$VITE_RESEARCH_API_URL"
          npm run build
          mkdir -p ../dist/research
          cp -R dist/. ../dist/research/

      - name: Finalize Pages artifact
        run: |
          cp .nojekyll dist/ || true
          cp CNAME dist/ || true

      - name: Verify styled Pages artifact
        run: |
          test -f dist/index.html
          test -f dist/pickledger/index.html
          test -f dist/pickledger/data/model_cache/index.json
          test -f dist/pickledger/data/profit_desk/index.json
          test -f dist/pickledger/data/profit_desk/latest.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

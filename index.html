<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#faf9f5" />
    <meta name="apple-mobile-web-app-title" content="Gym" />
    <link rel="icon" type="image/svg+xml" href="/gym/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/gym/apple-touch-icon.png" />
    <title>Gym</title>
    <script>
      (function () {
        var theme = 'light';
        try {
          var stored = window.localStorage.getItem('harsh-gym-theme-v1');
          if (stored === 'dark' || stored === 'light') {
            theme = stored;
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            theme = 'dark';
          }
        } catch (error) {
          theme = 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
        var metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) {
          metaTheme.setAttribute('content', theme === 'dark' ? '#23221d' : '#faf9f5');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
